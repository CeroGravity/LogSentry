# Config for Phase 3 R3 impossible-travel fixture tests.
[r3]
max_kmh = 900
min_distance_km = 500
consider_failures = false

# Neutralize R4 for this fixture (all days, full-day window) so the Phase 3
# golden stays R1/R2/R3-only and byte-identical after R4/R5 were added.
[r4]
timezone = "UTC"
business_days = [0, 1, 2, 3, 4, 5, 6]
business_start = "00:00"
business_end = "23:59"

[output]
fail_severity = "HIGH"

[ingest]
log_timezone = "UTC"

[geo]
resolver = "static"
static_path = "tests/fixtures/geo_static.csv"
