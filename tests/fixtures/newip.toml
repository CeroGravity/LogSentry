# R5 file-mode baseline (baseline passed via --baseline or this path).
[r5]
baseline_source = "tests/fixtures/newip_baseline.log"
only_success = true

[output]
fail_severity = "HIGH"

[ingest]
log_timezone = "UTC"

# Neutralize R4 so these R5 fixtures aren't perturbed by off-hours alerts.
[r4]
timezone = "UTC"
business_days = [0, 1, 2, 3, 4, 5, 6]
business_start = "00:00"
business_end = "23:59"
