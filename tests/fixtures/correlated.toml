# Correlation fixture config: enable cross-rule correlation (R0).
[r2]
window_seconds = 300
min_preceding_failures = 3
require_same_source_ip = true

[r4]
timezone = "America/New_York"
business_days = [0, 1, 2, 3, 4]
business_start = "08:00"
business_end = "18:00"
only_success = true

[correlation]
enabled = true
min_rules = 2

[output]
fail_severity = "HIGH"

[ingest]
log_timezone = "UTC"
